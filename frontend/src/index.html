<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Grimmory</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <link rel="preconnect" href="https://assets.hardcover.app">
  <link rel="preconnect" href="https://www.goodreads.com">
  <link rel="preconnect" href="https://www.amazon.com">
  <link rel="preconnect" href="https://books.google.com">
  <link rel="dns-prefetch" href="https://assets.hardcover.app">
  <link rel="dns-prefetch" href="https://www.goodreads.com">
  <link rel="dns-prefetch" href="https://www.amazon.com">
  <link rel="dns-prefetch" href="https://books.google.com">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg"/>
  <link rel="preload" href="media/primeicons-4GST5W3O.woff2" as="font" type="font/woff2" crossorigin="anonymous">
  <script>
    (function() {
      try {
        const token = localStorage.getItem('accessToken_Internal');
        
        // 1. Preload Consolidated Bootstrap (Parallelize with JS load)
        const bootLink = document.createElement('link');
        bootLink.rel = 'preload';
        bootLink.as = 'fetch';
        bootLink.href = '/api/v1/app/bootstrap';
        // We use credentials because the backend endpoint is either authenticated
        // or uses session info to decide what to return.
        bootLink.crossOrigin = 'use-credentials';
        document.head.appendChild(bootLink);

        if (!token) return;

        // 2. Preload Consolidated Context (Route-aware)
        const path = window.location.pathname;
        const bookMatch = path.match(/\/book\/(\d+)/);
        const dashLink = document.createElement('link');
        dashLink.rel = 'preload';
        dashLink.as = 'fetch';
        dashLink.crossOrigin = 'use-credentials';

        if (bookMatch) {
          dashLink.href = '/api/v1/app/books/' + bookMatch[1] + '/context';
        } else {
          dashLink.href = '/api/v1/app/dashboard';
        }
        document.head.appendChild(dashLink);

        // 3. Predictive LCP Preload (The cover image)
        const rawCandidate = localStorage.getItem('lcp_book_candidate');
        if (rawCandidate) {
          const candidate = JSON.parse(rawCandidate);
          const updatedOn = candidate.isAudio ? candidate.audioUpdatedOn : candidate.updatedOn;
          if (updatedOn) {
            const endpoint = candidate.isAudio ? 'audiobook-thumbnail' : 'thumbnail';
            const imageUrl = '/api/v1/media/book/' + candidate.id + '/' + endpoint + '?' + updatedOn + '&w=240&token=' + token;
            const imgLink = document.createElement('link');
            imgLink.rel = 'preload';
            imgLink.as = 'image';
            imgLink.href = imageUrl;
            imgLink.fetchPriority = 'high';
            document.head.appendChild(imgLink);
          }
        }
      } catch (e) {}
    })();
  </script>
  <link rel="manifest" href="manifest.webmanifest">
</head>

<body>
<app-root></app-root>
  <noscript>Please enable JavaScript to continue using this application.</noscript>
</body>

</html>
