# Caffeine JCache configuration for Hibernate Second-Level Cache
# This file defines the default and per-region settings to prevent unbounded memory growth.

caffeine.jcache {

  # Default settings for all cache regions not explicitly defined below
  default {
    policy {
      maximum.size = 1000
      expire-after-write = 10m
    }
  }

  # Specific configurations for high-volume or critical regions

  # Application Settings: Few entries, can stay longer. Use expire-after-access to keep hot ones.
  "org.booklore.model.entity.AppSettingEntity" {
    policy {
      maximum.size = 100
      expire-after-access = 24h
    }
  }
  "org.booklore.model.entity.AppSettingEntity##NaturalId" {
    policy {
      maximum.size = 100
      expire-after-access = 24h
    }
  }

  # Permissions: Critical for performance. Use READ_WRITE for security.
  "org.booklore.model.entity.UserPermissionsEntity" {
    policy {
      maximum.size = 500
      expire-after-write = 30m
    }
  }

  # Tags, Categories, Moods, Authors: Potentially thousands of entries
  "org.booklore.model.entity.TagEntity" {
    policy {
      maximum.size = 2000
      expire-after-write = 6h
    }
  }
  "org.booklore.model.entity.TagEntity##NaturalId" {
    policy {
      maximum.size = 2000
      expire-after-write = 6h
    }
  }

  "org.booklore.model.entity.AuthorEntity" {
    policy {
      maximum.size = 5000
      expire-after-write = 12h
    }
  }
  "org.booklore.model.entity.AuthorEntity##NaturalId" {
    policy {
      maximum.size = 5000
      expire-after-write = 12h
    }
  }

  "org.booklore.model.entity.CategoryEntity" {
    policy {
      maximum.size = 500
      expire-after-write = 6h
    }
  }
  "org.booklore.model.entity.CategoryEntity##NaturalId" {
    policy {
      maximum.size = 500
      expire-after-write = 6h
    }
  }

  "org.booklore.model.entity.MoodEntity" {
    policy {
      maximum.size = 500
      expire-after-write = 6h
    }
  }
  "org.booklore.model.entity.MoodEntity##NaturalId" {
    policy {
      maximum.size = 500
      expire-after-write = 6h
    }
  }

  # Books & Metadata: High volume, short TTL for safety and performance
  "org.booklore.model.entity.BookEntity" {
    policy {
      maximum.size = 5000
      expire-after-write = 10m
    }
  }
  "org.booklore.model.entity.BookMetadataEntity" {
    policy {
      maximum.size = 5000
      expire-after-write = 10m
    }
  }

  # Library Entity: Right-sized for "very few entries"
  "org.booklore.model.entity.LibraryEntity" {
    policy {
      maximum.size = 100
      expire-after-write = 1h
    }
  }
  
  # Library Paths: Associated with libraries
  "org.booklore.model.entity.LibraryPathEntity" {
    policy {
      maximum.size = 500
      expire-after-write = 1h
    }
  }

  # Custom Fonts
  "org.booklore.model.entity.CustomFontEntity" {
    policy {
      maximum.size = 100
      expire-after-write = 12h
    }
  }

  # Collection regions
  "org.booklore.model.entity.LibraryEntity.libraryPaths" {
    policy {
      maximum.size = 100
      expire-after-write = 1h
    }
  }
  
  # Metadata collections: Linked to books
  "org.booklore.model.entity.BookMetadataEntity.authors" {
    policy {
      maximum.size = 5000
      expire-after-write = 10m
    }
  }
  "org.booklore.model.entity.BookMetadataEntity.categories" {
    policy {
      maximum.size = 5000
      expire-after-write = 10m
    }
  }
  "org.booklore.model.entity.BookMetadataEntity.moods" {
    policy {
      maximum.size = 5000
      expire-after-write = 10m
    }
  }
  "org.booklore.model.entity.BookMetadataEntity.tags" {
    policy {
      maximum.size = 5000
      expire-after-write = 10m
    }
  }
  "org.booklore.model.entity.BookMetadataEntity.reviews" {
    policy {
      maximum.size = 1000
      expire-after-write = 10m
    }
  }

  # Reverse collections: Books per tag/etc
  "org.booklore.model.entity.TagEntity.bookMetadataEntityList" {
    policy {
      maximum.size = 1000
      expire-after-write = 10m
    }
  }
  "org.booklore.model.entity.CategoryEntity.bookMetadataEntityList" {
    policy {
      maximum.size = 500
      expire-after-write = 10m
    }
  }
  "org.booklore.model.entity.MoodEntity.bookMetadataEntityList" {
    policy {
      maximum.size = 500
      expire-after-write = 10m
    }
  }
  "org.booklore.model.entity.AuthorEntity.bookMetadataEntityList" {
    policy {
      maximum.size = 2000
      expire-after-write = 10m
    }
  }

  # Query Results Cache: Can be large depending on search patterns
  "default-query-results-region" {
    policy {
      maximum.size = 1000
      expire-after-write = 5m
    }
  }

  # Timestamp Cache: Must NOT have eviction or size limit to avoid stale query results
  "default-update-timestamps-region" {
  }
}
