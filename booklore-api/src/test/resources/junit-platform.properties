# Native library thread-safety is handled by dedicated single-thread
# executors (PdfiumNativeService, EpubNativeService).  libarchive uses
# per-file striped locks in ArchiveService.
#
# JUnit 5 parallel execution is disabled because Gradle 9.x has a known
# race condition writing binary test-result files when JUnit runs tests
# concurrently (NoSuchFileException on in-progress-results-generic*.bin).
junit.jupiter.execution.parallel.enabled = false

