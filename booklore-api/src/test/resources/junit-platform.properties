# ---------------------------------------------------------------------------
# JUnit Platform configuration for booklore-api
# ---------------------------------------------------------------------------

# Auto-detect extensions registered via META-INF/services.
# REQUIRED: this is how NativeLibraryExtension gets picked up before any
# test class runs, which in turn forces every native library to be loaded
# serialized and exactly once via NativeLibraries.Holder.
junit.jupiter.extensions.autodetection.enabled = true

# ---------------------------------------------------------------------------
# Parallel execution
#
# Safe with respect to native libraries because NativeLibraryExtension loads
# every native binary before any test method runs — see NativeLibraries.java.
# Individual tests whose state is not thread-safe must opt out explicitly with
# @Execution(SAME_THREAD) or @ResourceLock.
# ---------------------------------------------------------------------------
junit.jupiter.execution.parallel.enabled = true
junit.jupiter.execution.parallel.mode.default = concurrent
junit.jupiter.execution.parallel.mode.classes.default = concurrent

# Bound parallelism to available processors — don't thrash on CI.
junit.jupiter.execution.parallel.config.strategy = dynamic
junit.jupiter.execution.parallel.config.dynamic.factor = 1.0
